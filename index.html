<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Armata&family=Great+Vibes&family=Meow+Script&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">
        <div class="invite-card">
            <h2 class="fancy-font card-title fade-line">Wedding Invitation</h1>
                <p class="fancy-font align-left fade-line">Join us for a magical evening as our fairy tale comes.</p>
                <h1 class="fancy-font fade-line">Htet Aung Khant</h1>
                <h1 class="fancy-font align-center fade-line">&</h1>
                <h1 class="fancy-font align-right fade-line">Thaw Maw Htet</h1>
                <p class="fancy-font fade-line">Cordially invite you to our enchanted wedding</p>
                <p class="fancy-font fade-line">on 5th April, 2026</p>
                <p class="fancy-font fade-line">at 5th Floor of Utopia Wedding Reception Hall.</p>
        </div>
    </div>
    <div class="petal-container"></div>
    <script>
        const container = document.querySelector('.petal-container');

        function createPetal() {
            const petal = document.createElement('span');
            petal.classList.add('petal');

            const size = Math.random() * 10 + 10;
            const startX = Math.random() * window.innerWidth;
            const drift = (Math.random() - 0.5) * 200;
            const duration = Math.random() * 5 + 6;

            petal.style.width = `${size}px`;
            petal.style.height = `${size}px`;
            petal.style.left = `${startX}px`;
            petal.style.animationDuration = `${duration}s`;
            petal.style.setProperty('--drift', `${drift}px`);

            container.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        setInterval(createPetal, 400);
    </script>
</body>

</html>
